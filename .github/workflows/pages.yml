name: Build and Deploy Quarto

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: gitlab-registry.insee.fr/datascience/registry-qf/onyxia-rstudio:r4.5.1

    env:
      GIT_SSL_NO_VERIFY: "1"
      COULEURFORMAT: "default"  # à adapter ou remplacer par un secret

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug variables
        run: |
          echo "couleur du format choisie :"
          echo $COULEURFORMAT

      - name: Install R packages
        run: |
          Rscript -e 'install.packages(c(
            "yaml","jsonlite","htmltools","digest","knitr",
            "rmarkdown","dplyr","DT","plotly","leaflet",
            "RColorBrewer","sf","gapminder","rtauargus"
          ))'

      - name: Print working directory
        run: Rscript -e 'print(getwd())'

      - name: Render Quarto
        run: quarto render index.qmd --to insee-${COULEURFORMAT}-revealjs

      - name: Prepare public folder
        run: |
          mkdir -p public
          mv _output/* public/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: public
          path: public/

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: public
          path: public

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: public